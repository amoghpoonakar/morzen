<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morzen — Courses</title>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body class="app-body">

  <nav class="sidebar">
    <div class="sidebar-brand">M</div>
    <div class="sidebar-links">
      <button class="nav-btn" onclick="navigate('home.html')" title="Home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
          <polyline points="9,22 9,12 15,12 15,22" />
        </svg>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-btn active" onclick="navigate('courses.html')" title="Courses">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z" />
          <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z" />
        </svg>
        <span class="nav-label">Courses</span>
      </button>
      <button class="nav-btn" onclick="navigate('bonvoyage.html')" title="Bon Voyage">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" />
          <polygon points="16.24,7.76 14.12,14.12 7.76,16.24 9.88,9.88 16.24,7.76" />
        </svg>
        <span class="nav-label">Bon Voyage</span>
      </button>
      <button class="nav-btn" onclick="navigate('chatbot.html')" title="O.R.O">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
        </svg>
        <span class="nav-label">O.R.O</span>
      </button>
    </div>
    <div class="sidebar-bottom">
      <button class="nav-btn" onclick="openProfile()" title="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        <span class="nav-label">Profile</span>
      </button>
    </div>
  </nav>

  <div class="top-bar">
    <div class="top-bar-left">
      <h1 class="page-title">LEARNING MATRIX</h1>
    </div>
    <div class="top-bar-right">
      <div class="gold-pill">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
          <circle cx="12" cy="12" r="10" />
        </svg>
        <span id="goldDisplay">0</span>
      </div>
      <button class="profile-btn" onclick="openProfile()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </button>
    </div>
  </div>

  <main class="main-content courses-layout">

    <!-- LEFT PANEL -->
    <div class="courses-panel" id="coursesPanel">
      <div class="course-tabs">
        <button class="ctab-btn active" id="primaryTabBtn" onclick="switchCourseTab('primary')">PRIMARY</button>
        <button class="ctab-btn" id="additionalTabBtn" onclick="switchCourseTab('additional')">ADDITIONAL</button>
      </div>
      <div id="primaryCoursesList" class="ctab-content active"></div>
      <div id="additionalCoursesList" class="ctab-content"></div>
    </div>

    <!-- RIGHT PANEL: Player -->
    <div class="player-panel" id="playerPanel">
      <div class="player-idle" id="playerIdle">
        <div class="idle-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="60" height="60">
            <circle cx="12" cy="12" r="10" />
            <polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none" />
          </svg>
        </div>
        <p>Select a topic to begin</p>
        <span>Choose a module from the left panel</span>
      </div>

      <div class="player-active hidden" id="playerActive">
        <div class="player-header">
          <div class="player-breadcrumb" id="playerBreadcrumb">Course → Module → Topic</div>
          <div class="player-credits" id="playerCreditsLabel">+10 credits on completion</div>
        </div>
        <div class="video-area">
          <div class="video-placeholder">
            <div class="video-inner">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="52" height="52">
                <rect x="2" y="2" width="20" height="20" rx="3" />
                <polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none" />
              </svg>
              <p>Video not available yet</p>
            </div>
          </div>
        </div>
        <div class="player-controls">
          <button class="ctrl-btn" onclick="replayTopic()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17">
              <polyline points="1 4 1 10 7 10" />
              <path d="M3.51 15a9 9 0 102.13-9.36L1 10" />
            </svg>
          </button>
          <button class="ctrl-btn play-btn" id="playPauseBtn" onclick="togglePlayPause()">
            <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
              <polygon points="5,3 19,12 5,21" />
            </svg>
            <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" class="hidden">
              <rect x="6" y="4" width="4" height="16" />
              <rect x="14" y="4" width="4" height="16" />
            </svg>
          </button>
          <button class="ctrl-btn" onclick="nextTopic()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17">
              <polygon points="5,4 15,12 5,20" fill="currentColor" stroke="none" />
              <line x1="19" y1="5" x2="19" y2="19" />
            </svg>
          </button>
        </div>
        <button class="btn-complete" id="completeBtn" onclick="completeTopic()">MARK COMPLETE & EARN CREDITS</button>
        <div class="already-done hidden" id="alreadyDone">✓ TOPIC COMPLETED — REPEAT STUDY EARNS 5 CREDITS</div>
        <button class="btn-complete btn-repeat hidden" id="repeatBtn" onclick="repeatTopic()">REPEAT STUDY (+5
          CREDITS)</button>
      </div>
    </div>
  </main>

  <!-- Profile Modal -->
  <div id="profileModal" class="modal-overlay hidden">
    <div class="modal-box profile-modal-box">
      <button class="modal-close" onclick="closeProfile()">✕</button>
      <div class="profile-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="44" height="44">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </div>
      <h3 id="profileName">Agent</h3>
      <p class="profile-sub">Morzen Operative</p>
      <div class="profile-form">
        <label>Update Identity</label>
        <input type="text" id="profileNameInput" placeholder="New designation" />
        <button class="btn-primary" onclick="updateName()">UPDATE</button>
      </div>
      <button class="btn-logout" onclick="logout()">⏻ LOGOUT</button>
    </div>
  </div>

  <!-- Congrats -->
  <div id="congratsPopup" class="modal-overlay hidden">
    <div class="modal-box congrats-box">
      <div class="congrats-icon">⚡</div>
      <h2>TASK COMPLETE</h2>
      <p id="congratsMsg">Credits acquired.</p>
      <p class="total-gold-msg">Total Credits: <span id="congratsGold">0</span></p>
      <button class="btn-primary" onclick="closeCongrats()">ACKNOWLEDGED</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script>guardPage(); initCourses();</script>
</body>

</html>
