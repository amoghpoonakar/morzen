<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morzen — Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body class="app-body">

    <nav class="sidebar">
        <div class="sidebar-brand">M</div>
        <div class="sidebar-links">
            <button class="nav-btn active" onclick="navigate('home.html')" title="Home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                    <polyline points="9,22 9,12 15,12 15,22" />
                </svg>
                <span class="nav-label">Home</span>
            </button>
            <button class="nav-btn" onclick="navigate('courses.html')" title="Courses">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z" />
                    <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z" />
                </svg>
                <span class="nav-label">Courses</span>
            </button>
            <button class="nav-btn" onclick="navigate('bonvoyage.html')" title="Bon Voyage">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <polygon points="16.24,7.76 14.12,14.12 7.76,16.24 9.88,9.88 16.24,7.76" />
                </svg>
                <span class="nav-label">Bon Voyage</span>
            </button>
            <button class="nav-btn" onclick="navigate('chatbot.html')" title="O.R.O">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
                </svg>
                <span class="nav-label">O.R.O</span>
            </button>
        </div>
        <div class="sidebar-bottom">
            <button class="nav-btn" onclick="openProfile()" title="Profile">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                <span class="nav-label">Profile</span>
            </button>
        </div>
    </nav>

    <div class="top-bar">
        <div class="top-bar-left">
            <h1 class="page-title">COMMAND CENTER</h1>
        </div>
        <div class="top-bar-right">
            <div class="gold-pill">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                    <circle cx="12" cy="12" r="10" />
                </svg>
                <span id="goldDisplay">0</span>
            </div>
            <button class="profile-btn" onclick="openProfile()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </button>
        </div>
    </div>

    <main class="main-content">
        <div class="welcome-strip">
            <div class="welcome-text">
                <p class="welcome-greeting">SYSTEM ONLINE — Welcome back,</p>
                <h2 id="homeUserName">Agent</h2>
            </div>
            <div class="system-status">
                <span class="status-dot"></span> All systems operational
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon-wrap gold-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 6v6l4 2" />
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="statGold">0</span>
                    <span class="stat-label">Credits Earned</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon-wrap cyan-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="statCompleted">0</span>
                    <span class="stat-label">Topics Complete</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon-wrap red-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="statUnlocked">0</span>
                    <span class="stat-label">Voyages Unlocked</span>
                </div>
            </div>
        </div>

        <div class="section-label">PRIMARY MODULE STATUS</div>
        <div class="progress-cards" id="progressCards"></div>
    </main>

    <!-- Profile Modal -->
    <div id="profileModal" class="modal-overlay hidden">
        <div class="modal-box profile-modal-box">
            <button class="modal-close" onclick="closeProfile()">✕</button>
            <div class="profile-avatar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="44" height="44">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </div>
            <h3 id="profileName">Agent</h3>
            <p class="profile-sub">Morzen Operative</p>
            <div class="profile-form">
                <label>Update Identity</label>
                <input type="text" id="profileNameInput" placeholder="New designation" />
                <button class="btn-primary" onclick="updateName()">UPDATE</button>
            </div>
            <button class="btn-logout" onclick="logout()">⏻ LOGOUT</button>
        </div>
    </div>

    <!-- Congrats -->
    <div id="congratsPopup" class="modal-overlay hidden">
        <div class="modal-box congrats-box">
            <div class="congrats-icon">⚡</div>
            <h2>TASK COMPLETE</h2>
            <p id="congratsMsg">Credits acquired.</p>
            <p class="total-gold-msg">Total Credits: <span id="congratsGold">0</span></p>
            <button class="btn-primary" onclick="closeCongrats()">ACKNOWLEDGED</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>guardPage(); initHome();</script>
</body>

</html>
